name: Hourly Health Check

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Appwrite CLI
        run: npm install -g appwrite-cli

      - name: Configure Appwrite & Execute
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT || 'https://cloud.appwrite.io/v1' }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID || '69f2da78000231a299a3' }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          FUNCTION_ID: ${{ secrets.APPWRITE_HEALTH_FUNCTION_ID || '69f2e2230023ab412430' }}
        run: |
          if [ -z "$APPWRITE_API_KEY" ]; then
            echo "::error::APPWRITE_API_KEY is missing. Ensure it is added to Repository Secrets (not Environment Secrets)."
            exit 1
          fi

          echo "Configuring Appwrite Client..."
          appwrite client \
            --endpoint "$APPWRITE_ENDPOINT" \
            --project-id "$APPWRITE_PROJECT_ID" \
            --key "$APPWRITE_API_KEY"
          
          echo "Listing available functions for verification..."
          appwrite functions list
          
          echo "Triggering health-check function ($FUNCTION_ID)..."
          EXECUTION=$(appwrite functions create-execution \
            --function-id "$FUNCTION_ID" \
            --async false)
          
          echo "Execution Result:"
          echo "$EXECUTION" | jq .
          
          STATUS=$(echo "$EXECUTION" | jq -r '.status')
          if [ "$STATUS" != "completed" ]; then
            echo "FAIL: Function execution status is $STATUS"
            exit 1
          fi
          
          RESPONSE_BODY=$(echo "$EXECUTION" | jq -r '.responseBody')
          OK=$(echo "$RESPONSE_BODY" | jq -r '.ok')
          
          if [ "$OK" == "true" ]; then
            echo "SUCCESS: Health check passed."
          else
            echo "FAIL: Health check response 'ok' is not true."
            echo "Response: $RESPONSE_BODY"
            exit 1
          fi
