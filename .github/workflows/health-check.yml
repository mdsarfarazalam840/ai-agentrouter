name: Hourly Health Check

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: health-check
  cancel-in-progress: true

jobs:
  health-check:
    runs-on: ubuntu-latest
    environment: health

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Appwrite CLI
        run: npm install -g appwrite-cli

      - name: Configure Appwrite & Execute
        env:
          APPWRITE_ENDPOINT: ${{ vars.APPWRITE_ENDPOINT || 'https://cloud.appwrite.io/v1' }}
          APPWRITE_PROJECT_ID: ${{ vars.APPWRITE_PROJECT_ID || '69f2e19a00218fea645f' }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          FUNCTION_ID: ${{ vars.APPWRITE_HEALTH_FUNCTION_ID || '69f2e2230023ab412430' }}
        run: |
          if [ -z "$APPWRITE_API_KEY" ]; then
            echo "::error::APPWRITE_API_KEY is missing."
            exit 1
          fi

          python functions/health-check/health_check.py
